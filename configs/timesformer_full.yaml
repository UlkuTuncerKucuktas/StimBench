experiment:
  name: timesformer_full
  seed: 42
model:
  type: hf_peft
  backbone: timesformer
  adapter:
    type: full
dataset:
  path: UlkuTuncerKucuktas/StimBench
  classes: [armflapping, headbanging, normal, spinning]
preprocessing:
  num_frames: 16
  stride: 4
  resize: 224
  augmentation:
    horizontal_flip: 0.5
    temporal_reverse: 0.1
training:
  epochs: 30
  batch_size: 4
  optimizer:
    lr: 0.0001
    weight_decay: 0.05
  scheduler:
    eta_min: 0
  loss:
    label_smoothing: 0.1
  balanced_sampling: true
  fp16: false
evaluation:
  protocols: [1x1]
  save_misclassified: true
